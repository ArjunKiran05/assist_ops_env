name: assist_ops_env
version: 1.0.0
description: >
  Assist Ops is a community emergency response environment where an agent must
  assign trusted helpers to incoming requests under time and resource pressure.
entrypoint: server/app.py
tags:
  - emergency-response
  - resource-allocation
  - real-world
author: "Arjun Kiran"

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  tasks: GET /tasks
  grader: GET /grade/{task_id}
  health: GET /health

tasks:
  - id: easy
    name: Basic Emergency Matching
    difficulty: easy
    description: Match one helper to one request with direct skill alignment.
    max_steps: 10
    grader: true
  - id: medium
    name: Prioritized Limited-Helper Dispatch
    difficulty: medium
    description: Allocate scarce helpers across mixed-priority requests.
    max_steps: 10
    grader: true
  - id: hard
    name: Dynamic Community Assistance
    difficulty: hard
    description: Handle dynamic incoming requests under sustained time pressure.
    max_steps: 10
    grader: true

action_space:
  type: structured
  model: Action

observation_space:
  type: structured
  model: Observation

reward_range: [0.0, 1.0]
episode_termination:
  - all requests resolved
  - max_steps reached

docker:
  port: 7860
  health_check: GET /health
