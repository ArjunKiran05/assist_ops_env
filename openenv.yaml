name: assist_ops_env
version: 1.0.0
description: Assist Ops environment for Scaler hackathon
entrypoint: inference.py

tasks:
  - name: easy
    description: Simple matching with equal helpers and requests
    grader: grader.py:grade_easy

  - name: medium
    description: Limited helpers, requires prioritization
    grader: grader.py:grade_medium

  - name: hard
    description: Dynamic requests over time with limited resources
    grader: grader.py:grade_hard

endpoints:
  reset: /reset
  step: /step
  state: /state
  grader: /grader
  tasks: /tasks