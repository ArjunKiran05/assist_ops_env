spec_version: 1
name: assist_ops_env
type: space
runtime: fastapi
app: server.app:app
port: 7860

tasks:
  - id: easy
    name: Basic Emergency Matching
    difficulty: easy
    description: Match one helper to one request with direct skill alignment.
    max_steps: 10
    grader: true
    grader_fn: grade_easy
    reset_params:
      task: easy
  - id: medium
    name: Prioritized Limited-Helper Dispatch
    difficulty: medium
    description: Allocate scarce helpers across mixed-priority requests.
    max_steps: 10
    grader: true
    grader_fn: grade_medium
    reset_params:
      task: medium
  - id: hard
    name: Dynamic Community Assistance
    difficulty: hard
    description: Handle dynamic incoming requests under sustained time pressure.
    max_steps: 10
    grader: true
    grader_fn: grade_hard
    reset_params:
      task: hard

action_space:
  type: structured
  model: Action

observation_space:
  type: structured
  model: Observation

reward_range: [0.0, 1.0]
episode_termination:
  - all requests resolved
  - max_steps reached

docker:
  port: 7860
  health_check: GET /health
