name: assist_ops_env
version: 1.0.0
description: Assist Ops environment for Scaler hackathon
entrypoint: inference.py

endpoints:
  reset: /reset
  tasks: /tasks
  grader: /grade

tasks:
  - id: easy
    name: Basic Emergency Matching
    difficulty: easy
    description: Match one helper to one request with direct skill alignment.
    max_steps: 10
  - id: medium
    name: Prioritized Limited-Helper Dispatch
    difficulty: medium
    description: Allocate scarce helpers across mixed-priority requests.
    max_steps: 10
  - id: hard
    name: Dynamic Community Assistance
    difficulty: hard
    description: Handle dynamic incoming requests under sustained time pressure.
    max_steps: 10

grading:
  score_range: [0.0, 1.0]
  passing_threshold: 0.3
  metrics:
    - success
    - reward
    - trust
    - waiting_time
